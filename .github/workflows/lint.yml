name: Lint-Jobs
on:
  pull_request:
permissions:
  contents: read
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v3
        with:
          go-version: 1.24.2
      - uses: actions/checkout@v4
      - name: golangci-lint
        uses: golangci/golangci-lint-action@481777f62fe06de6923fd3a69efd3ba597fe628a
        with:
          version: latest
          args: --timeout 3m --verbose